<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Research Assistant</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">RA</div>
          <div>
            <h1>Research Assistant</h1>
            <p>Local paper workspace</p>
          </div>
        </div>
        <button id="new-chat" class="primary-button" type="button">New chat</button>
        <section class="paper-panel" aria-labelledby="papers-title">
          <div class="panel-heading">
            <h2 id="papers-title">Fetched papers</h2>
            <button id="refresh-papers" class="icon-button" type="button" title="Refresh papers">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M21 12a9 9 0 0 1-15.3 6.4" />
                <path d="M3 12a9 9 0 0 1 15.3-6.4" />
                <path d="M18 2v4h-4" />
                <path d="M6 22v-4h4" />
              </svg>
            </button>
          </div>
          <div id="paper-list" class="paper-list">
            <div class="empty-state">No papers loaded yet.</div>
          </div>
        </section>
      </aside>

      <main class="chat-area">
        <header class="topbar">
          <div>
            <span class="eyebrow">LangGraph planner</span>
            <h2>Ask about papers, evidence, and research directions</h2>
          </div>
          <div id="status-pill" class="status-pill">Ready</div>
        </header>

        <section id="messages" class="messages" aria-live="polite">
          <article class="message assistant">
            <div class="avatar">A</div>
            <div class="bubble">
              Ask a research question or request papers. Retrieved answers stream in as the model writes them.
            </div>
          </article>
        </section>

        <form id="chat-form" class="composer">
          <textarea
            id="message-input"
            rows="1"
            placeholder="Ask about agentic RAG, compare papers, or find new work..."
            autocomplete="off"
          ></textarea>
          <button id="send-button" type="submit">Send</button>
        </form>
      </main>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
